<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Task Orchestrator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
      height: 100vh;
      color: #e0e0e0;
      overflow: hidden;
    }
    
    /* Main Layout */
    .app-layout {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }
    
    /* Header */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .header h1 {
      font-size: 1.3rem;
      background: linear-gradient(90deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-controls {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }
    
    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link:hover { color: #fff; }
    
    /* Sidebar Toggle */
    .sidebar-toggle {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .sidebar-toggle:hover { background: rgba(255,255,255,0.15); }
    .sidebar-toggle.active { background: rgba(123, 47, 255, 0.3); }
    
    /* Workspace Sidebar */
    .workspace-sidebar {
      width: 280px;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      transition: width 0.3s, opacity 0.3s;
      overflow: hidden;
    }
    
    .workspace-sidebar.collapsed {
      width: 0;
      border: none;
    }
    
    .workspace-header {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .workspace-path-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .workspace-path-input:focus { outline: none; border-color: #7b2fff; }
    
    .workspace-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    
    .ws-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 6px;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .ws-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    
    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }
    
    .tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 15px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .tree-item:hover { background: rgba(255,255,255,0.05); }
    .tree-item.active { background: rgba(123, 47, 255, 0.2); }
    .tree-item.directory { color: #888; }
    .tree-item.file { color: #e0e0e0; }
    .tree-icon { width: 16px; text-align: center; }
    .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-indent { width: 16px; flex-shrink: 0; }
    .tree-children { display: none; }
    .tree-children.open { display: block; }
    
    /* Main Content */
    .main-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 15px;
      gap: 15px;
    }
    
    /* Task Input */
    .task-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
    }
    
    .task-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      min-height: 70px;
      margin-bottom: 10px;
    }
    .task-input:focus { outline: none; border-color: #7b2fff; }
    
    .task-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .select-input {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 8px 12px;
      color: #fff;
      font-family: inherit;
      font-size: 0.8rem;
    }
    
    .btn {
      background: linear-gradient(135deg, #7b2fff, #00d4ff);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn.secondary { background: rgba(255,255,255,0.1); }
    
    /* DAG & Logs Grid */
    .work-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      overflow: hidden;
    }
    
    .panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .panel-icon { font-size: 1.1rem; }
    .panel-title { font-size: 0.85rem; font-weight: 600; }
    
    .view-toggle {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.3);
      padding: 3px;
      border-radius: 6px;
      margin-left: auto;
    }
    
    .view-btn {
      padding: 5px 10px;
      border: none;
      background: transparent;
      color: #888;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .view-btn.active { background: rgba(123, 47, 255, 0.3); color: #fff; }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    /* DAG Levels */
    .execution-level {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      position: relative;
    }
    
    .level-label {
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
    }
    
    .subtask-card {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px;
      min-width: 150px;
    }
    
    .subtask-card.pending { border-color: #666; }
    .subtask-card.running { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
    .subtask-card.complete { border-color: #10b981; }
    .subtask-card.error { border-color: #ef4444; }
    
    .subtask-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    
    .subtask-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .pending .subtask-status { background: #666; }
    .running .subtask-status { background: #f59e0b; animation: pulse 1s infinite; }
    .complete .subtask-status { background: #10b981; }
    .error .subtask-status { background: #ef4444; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .subtask-id { font-size: 0.6rem; color: #888; background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 3px; }
    .subtask-model { font-size: 0.6rem; padding: 2px 6px; border-radius: 8px; margin-left: auto; }
    .model-haiku { background: #10b981; color: #fff; }
    .model-sonnet { background: #6366f1; color: #fff; }
    .model-opus { background: #ec4899; color: #fff; }
    
    .subtask-name { font-size: 0.75rem; line-height: 1.4; margin-bottom: 6px; }
    .subtask-result { font-size: 0.7rem; color: #888; max-height: 60px; overflow: hidden; }
    
    /* Graph Canvas */
    .graph-canvas-container {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 250px;
    }
    
    #dagCanvas { width: 100%; height: 100%; }
    
    /* Logs */
    .log-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .log-time { color: #666; flex-shrink: 0; }
    .log-model { padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; }
    .log-msg { flex: 1; }
    
    /* Output Sidebar */
    .output-sidebar {
      width: 400px;
      background: rgba(0,0,0,0.2);
      border-left: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      transition: width 0.3s;
    }
    
    .output-sidebar.collapsed { width: 0; border: none; overflow: hidden; }
    
    .output-header {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .output-title { font-size: 0.85rem; font-weight: 600; }
    
    .output-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    
    .output-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }
    
    .output-code {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .output-code pre {
      margin: 0;
      padding: 15px;
      overflow-x: auto;
    }
    
    .output-code code {
      font-family: 'SF Mono', 'JetBrains Mono', monospace !important;
      font-size: 0.8rem !important;
      line-height: 1.5 !important;
    }
    
    .output-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #666;
      gap: 10px;
    }
    
    .output-placeholder-icon { font-size: 2rem; }
    
    /* Save Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.visible { display: flex; }
    
    .modal {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
    }
    
    .modal h2 { margin-bottom: 20px; font-size: 1.1rem; }
    
    .modal-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-family: inherit;
      margin-bottom: 15px;
    }
    .modal-input:focus { outline: none; border-color: #7b2fff; }
    
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    
    /* Stats Bar */
    .stats-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 30px;
      padding: 8px 20px;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.75rem;
    }
    
    .stat { display: flex; align-items: center; gap: 8px; }
    .stat-value { color: #fff; font-weight: 600; }
    .stat-label { color: #888; }
    
    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      gap: 10px;
    }
    .empty-icon { font-size: 2rem; }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Header -->
    <div class="header">
      <a href="/" class="back-link">← Dashboard</a>
      <h1>🧠 Task Orchestrator</h1>
      <div class="header-controls">
        <button class="sidebar-toggle active" id="toggleWorkspace" onclick="toggleWorkspace()">📁 Workspace</button>
        <button class="sidebar-toggle active" id="toggleOutput" onclick="toggleOutput()">📄 Output</button>
        <button class="sidebar-toggle" onclick="toggleModelConfig()">⚙️ Models</button>
      </div>
    </div>
    
    <!-- Workspace Sidebar -->
    <div class="workspace-sidebar" id="workspaceSidebar">
      <div class="workspace-header">
        <input type="text" class="workspace-path-input" id="workspacePath" placeholder="/path/to/project" value="">
        <div class="workspace-actions">
          <button class="ws-btn" onclick="loadWorkspace()">📂 Open</button>
          <button class="ws-btn" onclick="refreshTree()">↻</button>
          <button class="ws-btn" onclick="showNewFileModal()">+ File</button>
        </div>
      </div>
      <div class="file-tree" id="fileTree">
        <div class="empty-state" style="padding: 30px;">
          <div>Enter workspace path</div>
        </div>
      </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
      <!-- Task Input -->
      <div class="task-section">
        <textarea class="task-input" id="taskInput" placeholder="Enter a task to decompose and execute...&#10;&#10;Example: Write a function to sort an array using quicksort algorithm"></textarea>
        <div class="task-controls">
          <select class="select-input" id="orchestratorModel">
            <option value="haiku">Haiku (Fast)</option>
            <option value="sonnet" selected>Sonnet (Balanced)</option>
            <option value="opus">Opus (Quality)</option>
          </select>
          <select class="select-input" id="routingStrategy">
            <option value="auto">Auto Routing</option>
            <option value="cheapest">Cheapest</option>
            <option value="quality">Quality</option>
          </select>
          <button class="btn" id="runBtn" onclick="runDecomposition()">🚀 Execute</button>
        </div>
      </div>
      
      <!-- DAG & Logs -->
      <div class="work-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-icon">🌳</span>
            <span class="panel-title">Execution DAG</span>
            <div class="view-toggle">
              <button class="view-btn active" id="viewLevels" onclick="setView('levels')">Levels</button>
              <button class="view-btn" id="viewGraph" onclick="setView('graph')">Graph</button>
            </div>
          </div>
          <div class="panel-content" id="dagContainer">
            <div class="empty-state">
              <div class="empty-icon">🎯</div>
              <div>Enter a task to see the DAG</div>
            </div>
          </div>
          <div class="panel-content" id="graphContainer" style="display: none;">
            <div class="graph-canvas-container">
              <canvas id="dagCanvas"></canvas>
            </div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <span class="panel-icon">📊</span>
            <span class="panel-title">Execution Logs</span>
          </div>
          <div class="panel-content" id="logs">
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <div>Logs appear here</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Output Sidebar -->
    <div class="output-sidebar" id="outputSidebar">
      <div class="output-header">
        <span class="panel-icon">📄</span>
        <span class="output-title">Final Output</span>
        <div class="output-actions">
          <button class="ws-btn" onclick="copyOutput()">📋 Copy</button>
          <button class="ws-btn" onclick="showSaveModal()">💾 Save</button>
        </div>
      </div>
      <div class="output-content" id="outputContent">
        <div class="output-placeholder">
          <div class="output-placeholder-icon">📄</div>
          <div>Output will appear here</div>
        </div>
      </div>
    </div>
    
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="statSubtasks">0</span>
        <span class="stat-label">Subtasks</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statLevels">0</span>
        <span class="stat-label">Levels</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statTokens">0</span>
        <span class="stat-label">Tokens</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statTime">0s</span>
        <span class="stat-label">Time</span>
      </div>
    </div>
  </div>
  
  <!-- Save Modal -->
  <div class="modal-overlay" id="saveModal">
    <div class="modal">
      <h2>💾 Save Output to File</h2>
      <input type="text" class="modal-input" id="saveFilePath" placeholder="filename.js (relative to workspace)">
      <div class="modal-actions">
        <button class="btn secondary" onclick="hideSaveModal()">Cancel</button>
        <button class="btn" onclick="saveOutput()">Save</button>
      </div>
    </div>
  </div>
  
  <script>
    // State
    let taskId = null;
    let pollInterval = null;
    let startTime = null;
    let logs = [];
    let subtasks = [];
    let executionLevels = [];
    let currentView = 'levels';
    let finalOutput = '';
    let workspacePath = localStorage.getItem('orchestrator-workspace') || '';
    
    // Initialize
    document.getElementById('workspacePath').value = workspacePath;
    if (workspacePath) loadWorkspace();
    
    // Model config
    const MODEL_COLORS = { haiku: 'model-haiku', sonnet: 'model-sonnet', opus: 'model-opus' };
    const MODEL_NAMES = { haiku: 'HAIKU', sonnet: 'SONNET', opus: 'OPUS' };
    
    // Toggle panels
    function toggleWorkspace() {
      const sidebar = document.getElementById('workspaceSidebar');
      const btn = document.getElementById('toggleWorkspace');
      sidebar.classList.toggle('collapsed');
      btn.classList.toggle('active');
    }
    
    function toggleOutput() {
      const sidebar = document.getElementById('outputSidebar');
      const btn = document.getElementById('toggleOutput');
      sidebar.classList.toggle('collapsed');
      btn.classList.toggle('active');
    }
    
    function toggleModelConfig() {
      alert('Model config coming soon!');
    }
    
    // Workspace functions
    async function loadWorkspace() {
      workspacePath = document.getElementById('workspacePath').value.trim();
      if (!workspacePath) return;
      
      localStorage.setItem('orchestrator-workspace', workspacePath);
      
      try {
        const res = await fetch(`/api/workspace/tree?path=${encodeURIComponent(workspacePath)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderTree(data.tree, document.getElementById('fileTree'));
      } catch (e) {
        document.getElementById('fileTree').innerHTML = `<div class="empty-state" style="padding: 20px; color: #ef4444;">${e.message}</div>`;
      }
    }
    
    function renderTree(items, container, depth = 0) {
      container.innerHTML = '';
      items.sort((a, b) => {
        if (a.type === b.type) return a.name.localeCompare(b.name);
        return a.type === 'directory' ? -1 : 1;
      });
      
      items.forEach(item => {
        const div = document.createElement('div');
        const itemEl = document.createElement('div');
        itemEl.className = `tree-item ${item.type}`;
        itemEl.innerHTML = `
          ${'<span class="tree-indent"></span>'.repeat(depth)}
          <span class="tree-icon">${item.type === 'directory' ? '📁' : getFileIcon(item.name)}</span>
          <span class="tree-name">${item.name}</span>
        `;
        
        if (item.type === 'directory') {
          const childContainer = document.createElement('div');
          childContainer.className = 'tree-children';
          
          itemEl.onclick = async () => {
            if (childContainer.children.length === 0) {
              const res = await fetch(`/api/workspace/tree?path=${encodeURIComponent(item.path)}`);
              const data = await res.json();
              renderTree(data.tree || [], childContainer, depth + 1);
            }
            childContainer.classList.toggle('open');
            itemEl.querySelector('.tree-icon').textContent = childContainer.classList.contains('open') ? '📂' : '📁';
          };
          
          div.appendChild(itemEl);
          div.appendChild(childContainer);
        } else {
          itemEl.onclick = () => viewFile(item.path);
          div.appendChild(itemEl);
        }
        
        container.appendChild(div);
      });
    }
    
    function getFileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const icons = { js: '📜', ts: '📘', py: '🐍', html: '🌐', css: '🎨', json: '📋', md: '📝' };
      return icons[ext] || '📄';
    }
    
    async function viewFile(path) {
      try {
        const res = await fetch(`/api/workspace/file?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        const ext = path.split('.').pop().toLowerCase();
        const langMap = { js: 'javascript', ts: 'typescript', py: 'python', html: 'html', css: 'css', json: 'json', md: 'markdown' };
        const lang = langMap[ext] || 'plaintext';
        
        const highlighted = hljs.highlight(data.content, { language: lang, ignoreIllegals: true }).value;
        document.getElementById('outputContent').innerHTML = `
          <div style="margin-bottom: 10px; color: #888; font-size: 0.8rem;">📄 ${path}</div>
          <div class="output-code"><pre><code class="hljs">${highlighted}</code></pre></div>
        `;
      } catch (e) {
        alert('Failed to load file: ' + e.message);
      }
    }
    
    function refreshTree() { loadWorkspace(); }
    
    function showNewFileModal() {
      const name = prompt('New file name:');
      if (name) createFile(name);
    }
    
    async function createFile(name) {
      const path = workspacePath + '/' + name;
      try {
        await fetch('/api/workspace/file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path, content: '' })
        });
        refreshTree();
      } catch (e) {
        alert('Failed to create file: ' + e.message);
      }
    }
    
    // DAG View
    function setView(view) {
      currentView = view;
      document.getElementById('viewLevels').classList.toggle('active', view === 'levels');
      document.getElementById('viewGraph').classList.toggle('active', view === 'graph');
      document.getElementById('dagContainer').style.display = view === 'levels' ? 'block' : 'none';
      document.getElementById('graphContainer').style.display = view === 'graph' ? 'block' : 'none';
      if (view === 'graph') renderGraph();
    }
    
    // Logs
    function addLog(type, model, message) {
      logs.push({ time: new Date().toLocaleTimeString(), type, model, message });
      renderLogs();
    }
    
    function renderLogs() {
      const el = document.getElementById('logs');
      if (!logs.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>Logs appear here</div></div>';
        return;
      }
      el.innerHTML = logs.map(l => `
        <div class="log-entry">
          <span class="log-time">${l.time}</span>
          ${l.model ? `<span class="log-model ${MODEL_COLORS[l.model]}">${MODEL_NAMES[l.model]}</span>` : ''}
          <span class="log-msg">${l.message}</span>
        </div>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }
    
    // DAG rendering
    function renderDAG() {
      const container = document.getElementById('dagContainer');
      if (!executionLevels.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎯</div><div>Enter a task to see the DAG</div></div>';
        return;
      }
      
      const subtaskMap = {};
      subtasks.forEach(st => subtaskMap[st.id] = st);
      
      let html = '';
      executionLevels.forEach((levelIds, levelIdx) => {
        const levelSubtasks = levelIds.map(id => subtaskMap[id]).filter(Boolean);
        html += `
          <div class="execution-level">
            <span class="level-label">L${levelIdx + 1}</span>
            ${levelSubtasks.map(st => `
              <div class="subtask-card ${st.status}">
                <div class="subtask-header">
                  <div class="subtask-status"></div>
                  <span class="subtask-id">${st.id}</span>
                  <span class="subtask-model ${MODEL_COLORS[st.model]}">${MODEL_NAMES[st.model] || st.model}</span>
                </div>
                <div class="subtask-name">${st.name}</div>
                ${st.result ? `<div class="subtask-result">${st.result.slice(0, 100)}...</div>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      });
      container.innerHTML = html;
    }
    
    // Graph rendering
    let nodePositions = {};
    
    function renderGraph() {
      const canvas = document.getElementById('dagCanvas');
      const container = document.getElementById('graphContainer');
      const ctx = canvas.getContext('2d');
      
      const rect = container.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      const width = rect.width;
      const height = rect.height;
      
      nodePositions = {};
      const subtaskMap = {};
      subtasks.forEach(st => subtaskMap[st.id] = st);
      
      const levelSpacing = width / (executionLevels.length + 1);
      
      executionLevels.forEach((levelIds, levelIdx) => {
        const nodeSpacing = height / (levelIds.length + 1);
        levelIds.forEach((id, nodeIdx) => {
          nodePositions[id] = {
            x: levelSpacing * (levelIdx + 1),
            y: nodeSpacing * (nodeIdx + 1),
            subtask: subtaskMap[id]
          };
        });
      });
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      // Draw edges
      subtasks.forEach(st => {
        const to = nodePositions[st.id];
        if (!to) return;
        
        (st.dependsOn || []).forEach(depId => {
          const from = nodePositions[depId];
          if (!from) return;
          
          ctx.beginPath();
          ctx.strokeStyle = st.status === 'complete' ? 'rgba(16, 185, 129, 0.6)' : 'rgba(123, 47, 255, 0.4)';
          ctx.lineWidth = 2;
          const midX = (from.x + to.x) / 2;
          ctx.moveTo(from.x, from.y);
          ctx.bezierCurveTo(midX, from.y, midX, to.y, to.x, to.y);
          ctx.stroke();
        });
      });
      
      // Draw nodes
      const nodeRadius = 22;
      Object.entries(nodePositions).forEach(([id, pos]) => {
        const st = pos.subtask;
        if (!st) return;
        
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, nodeRadius, 0, Math.PI * 2);
        const colors = { pending: '#333', running: '#f59e0b', complete: '#10b981', error: '#ef4444' };
        ctx.fillStyle = colors[st.status] || '#333';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(st.id.toUpperCase(), pos.x, pos.y);
      });
    }
    
    // Stats
    function updateStats() {
      if (!startTime) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('statTime').textContent = `${elapsed}s`;
      document.getElementById('statSubtasks').textContent = subtasks.length;
      document.getElementById('statLevels').textContent = executionLevels.length;
      const tokens = subtasks.reduce((sum, st) => sum + (st.tokens || 0), 0);
      document.getElementById('statTokens').textContent = tokens.toLocaleString();
    }
    
    // Orchestration
    async function runDecomposition() {
      const task = document.getElementById('taskInput').value.trim();
      if (!task) return alert('Please enter a task');
      
      const orchestratorModel = document.getElementById('orchestratorModel').value;
      const strategy = document.getElementById('routingStrategy').value;
      
      logs = [];
      subtasks = [];
      executionLevels = [];
      finalOutput = '';
      startTime = Date.now();
      
      document.getElementById('runBtn').disabled = true;
      addLog('system', null, '🚀 Starting orchestration...');
      renderDAG();
      
      const statsInterval = setInterval(updateStats, 1000);
      
      try {
        const response = await fetch('/api/orchestrate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, orchestratorModel, strategy })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        taskId = data.taskId;
        subtasks = data.subtasks;
        executionLevels = data.executionLevels || [];
        
        addLog('orchestrator', orchestratorModel, `Decomposed into ${subtasks.length} subtasks`);
        renderDAG();
        
        // Poll for updates
        pollInterval = setInterval(async () => {
          try {
            const status = await fetch(`/api/orchestrate/status/${taskId}`).then(r => r.json());
            
            if (status.subtasks) {
              status.subtasks.forEach((st, i) => {
                const prev = subtasks[i];
                if (prev && prev.status !== st.status) {
                  if (st.status === 'running') addLog('subagent', st.model, `▶️ ${st.name}`);
                  else if (st.status === 'complete') addLog('subagent', st.model, `✅ ${st.name}`);
                }
                subtasks[i] = { ...subtasks[i], ...st };
              });
              renderDAG();
              if (currentView === 'graph') renderGraph();
              updateStats();
            }
            
            if (status.complete) {
              clearInterval(pollInterval);
              clearInterval(statsInterval);
              addLog('system', null, '🎉 Complete!');
              document.getElementById('runBtn').disabled = false;
              
              // Combine outputs for final result
              finalOutput = subtasks.map(st => st.result).filter(Boolean).join('\n\n');
              showOutput(finalOutput);
            }
          } catch (err) {
            console.error('Poll error:', err);
          }
        }, 800);
        
      } catch (err) {
        addLog('system', null, `❌ Error: ${err.message}`);
        document.getElementById('runBtn').disabled = false;
        clearInterval(statsInterval);
      }
    }
    
    // Output
    function showOutput(content) {
      const lang = detectLanguage(content);
      const highlighted = hljs.highlight(content, { language: lang, ignoreIllegals: true }).value;
      document.getElementById('outputContent').innerHTML = `
        <div class="output-code"><pre><code class="hljs">${highlighted}</code></pre></div>
      `;
    }
    
    function detectLanguage(content) {
      if (content.includes('function') || content.includes('const ') || content.includes('let ')) return 'javascript';
      if (content.includes('def ') || content.includes('import ')) return 'python';
      if (content.includes('<html') || content.includes('<div')) return 'html';
      return 'plaintext';
    }
    
    function copyOutput() {
      navigator.clipboard.writeText(finalOutput);
      alert('Copied to clipboard!');
    }
    
    function showSaveModal() {
      if (!finalOutput) return alert('No output to save');
      if (!workspacePath) return alert('Set workspace path first');
      document.getElementById('saveModal').classList.add('visible');
      document.getElementById('saveFilePath').focus();
    }
    
    function hideSaveModal() {
      document.getElementById('saveModal').classList.remove('visible');
    }
    
    async function saveOutput() {
      const filename = document.getElementById('saveFilePath').value.trim();
      if (!filename) return alert('Enter a filename');
      
      const fullPath = workspacePath + '/' + filename;
      
      try {
        const res = await fetch('/api/workspace/file', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: fullPath, content: finalOutput })
        });
        
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        
        hideSaveModal();
        refreshTree();
        addLog('system', null, `💾 Saved to ${filename}`);
      } catch (e) {
        alert('Failed to save: ' + e.message);
      }
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideSaveModal();
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runDecomposition();
    });
    
    // Resize handler
    window.addEventListener('resize', () => {
      if (currentView === 'graph') renderGraph();
    });
  </script>
</body>
</html>
